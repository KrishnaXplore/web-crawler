services:
  redis:
    image: redis:7-alpine
    container_name: crawler-redis
    # Host port 6380 to avoid colliding with any Redis already on 6379.
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:7
    container_name: crawler-mongo
    # Host port 27018 to avoid colliding with any Mongo already on 27017.
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: crawler-minio
    # API on 9002, console on 9003 (9000/9001 are taken on this machine).
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Application services (M7 Step C) ----------------------------------
  # Plain `docker compose up` still starts infra only (local-dev workflow).
  # `docker compose --profile app up --build` runs the whole product.

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    profiles: [app]
    environment:
      REDIS_URL: redis://redis:6379
      MONGO_URL: mongodb://mongo:27017/crawler
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
    ports:
      - "3000:3000"
    depends_on:
      redis: { condition: service_healthy }
      mongo: { condition: service_healthy }

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    profiles: [app]
    environment:
      REDIS_URL: redis://redis:6379
      MONGO_URL: mongodb://mongo:27017/crawler
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
    depends_on:
      redis: { condition: service_healthy }
      mongo: { condition: service_healthy }
      minio: { condition: service_healthy }

  renderer:
    build:
      context: .
      dockerfile: services/renderer/Dockerfile
    profiles: [app]
    environment:
      REDIS_URL: redis://redis:6379
      MONGO_URL: mongodb://mongo:27017/crawler
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
    depends_on:
      redis: { condition: service_healthy }
      mongo: { condition: service_healthy }
      minio: { condition: service_healthy }

  web:
    build:
      context: .
      dockerfile: services/web/Dockerfile
    profiles: [app]
    # Host port 8090 (8080/8081 commonly taken on dev machines).
    ports:
      - "8090:80"
    depends_on:
      - api

volumes:
  redis-data:
  mongo-data:
  minio-data:
