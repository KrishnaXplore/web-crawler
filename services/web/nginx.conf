# Production shape from architecture-v2 §2 / phase5d: nginx serves the static
# bundle and routes /api to the api service — same-origin everywhere, no CORS.
server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    # Trailing slash strips the /api prefix — same rewrite as the Vite dev proxy.
    proxy_pass http://api:3000/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    try_files $uri /index.html;
  }
}
